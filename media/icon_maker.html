<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pro Icon Generator</title>
    <style>
        body {
            background-color: #030712; 
            color: #f3f4f6;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #818cf8; } 
        #preview {
            width: 150px;
            height: 150px;
            border-radius: 20%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin: 20px 0;
            border: 1px solid #1f2937;
        }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button {
            background-color: #4f46e5; 
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #4338ca; }
    </style>
</head>
<body>

    <h1>Aura Pro Icon Maker</h1>
    <p>Preview of your app icon:</p>
    
    <img id="preview" alt="Icon Preview" />
    <canvas id="canvas" style="display: none;"></canvas>

    <div class="btn-group">
        <button onclick="downloadIcon(192)">Download icon-192x192.png</button>
        <button onclick="downloadIcon(512)">Download icon-512x512.png</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function drawIcon(size) {
            canvas.width = size;
            canvas.height = size;

            // 1. Draw solid dark background to match theme-color
            ctx.fillStyle = '#030712';
            ctx.fillRect(0, 0, size, size);

            const cx = size / 2;
            const cy = size / 2;
            
            // 2. Draw outer glowing ring
            ctx.beginPath();
            ctx.arc(cx, cy, size * 0.42, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(79, 70, 229, 0.15)'; 
            ctx.fill();

            // 3. Draw main Indigo gradient circle
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#818cf8'); 
            gradient.addColorStop(1, '#4338ca'); 
            
            ctx.beginPath();
            ctx.arc(cx, cy, size * 0.35, 0, 2 * Math.PI);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 4. Draw perfectly centered Play Triangle using Centroid Math
            const r = size * 0.35; 
            const triWidth = r * 0.75;
            const triHeight = r * 0.85;
            
            // Center of mass (centroid) is 1/3 from the base.
            // We align that centroid perfectly with cx, cy.
            ctx.beginPath();
            ctx.moveTo(cx + (triWidth * 2/3), cy); // Right tip
            ctx.lineTo(cx - (triWidth / 3), cy - (triHeight / 2)); // Top left
            ctx.lineTo(cx - (triWidth / 3), cy + (triHeight / 2)); // Bottom left
            ctx.closePath();
            
            // Add rounded corners to the triangle
            ctx.lineJoin = 'round';
            ctx.lineWidth = size * 0.04;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.fill();
        }

        // Generate the preview immediately
        drawIcon(512);
        document.getElementById('preview').src = canvas.toDataURL('image/png');

        function downloadIcon(size) {
            drawIcon(size);
            const link = document.createElement('a');
            link.download = `icon-${size}x${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
